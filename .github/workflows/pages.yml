name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/heizlastberechnung-project-2dbLv", "main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy app.html to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create a clean gh-pages branch with only app.html + index redirect
          git checkout --orphan gh-pages-tmp
          # Keep only app.html
          git rm -rf . --quiet
          git checkout HEAD -- app.html
          # Add a redirect index.html
          echo '<meta http-equiv="refresh" content="0; url=app.html">' > index.html
          git add app.html index.html
          git commit -m "Deploy app.html [skip ci]"
          git push origin HEAD:gh-pages --force
