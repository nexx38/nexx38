name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/heizlastberechnung-project-2dbLv", "claude/heating-report-camera-layout-02mu7l", "main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build offline app.html (Chart.js inlined)
        run: python3 build.py

      - name: Deploy app.html to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp app.html /tmp/app.html
          echo '<meta http-equiv="refresh" content="0; url=app.html">' > /tmp/index.html
          git checkout --orphan gh-pages-tmp
          git rm -rf . --quiet
          cp /tmp/app.html app.html
          cp /tmp/index.html index.html
          git add app.html index.html
          git commit -m "Deploy app.html [skip ci]"
          git push origin HEAD:gh-pages --force
